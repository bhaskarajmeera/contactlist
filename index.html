<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- bootstrap cdn  -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="./style.css">
<title>Contact List</title>
</head>
<body>
<div class="wrapper min-vh-100 d-flex justify-content-center align-items-center">
<div class="phone border border-5 border-black rounded-5 shadow-lg overflow-y-scroll" style="height: 600px;width:300px">
    <!-- black section in phone icon -->
     <div class="text-white d-flex justify-content-between align-items-center" style="height: 50px; padding:10px">
        <span>12:12</span>
        <div class="bg-black w-25 rounded-pill" style="height: 1.4rem;"></i>
        </div>
        <div><i class="bi bi-wifi"> </i>
        <i class="bi bi-bar-chart"></i>
        <i class="bi bi-battery-half"></i>
        </div>
     </div>
<!-- Home Screen -->
 <main class="homeScreen h-100 p-5 position-relative" style="display: none;">
    <div class="slide-container bg-white p-3 rounded-4 shadow position-absolute" style="top:400px">
        <input type="range" 
        min="0" 
        max="100" 
        value="0"
        class="slider"
        id="mySlider"/>
        <label id="label" class="position-absolute text-center w-100">Slide To Unlock</label>
    </div>
 </main>
 <!-- apps Screen -->
<main class="appScreen p-2 bg-dark pt-5" style="height: 540px;display: none;">
    <div class="d-flex justify-content-center">
    <div class="d-flex flex-column align-items-center">
    <i class="bi bi-person-rolodex text-danger fs-2 bg-white px-3 rounded"></i>
    <span class="text-white">Contact</span> 
    </div>
    </div>
</main>
<!-- contact list Screen -->
<main class="conactListScreen" style="height: 90%;">
<div class="contactListContainer">
<!-- title -->
<h2 class="p-2">Contacts</h2>
<!-- search bar-->
<div class="header mt-2 p-2 position-relative">
   <i class="bi bi-search position-absolute fs-4 mx-1 text-secondary"></i>
<input type="text" id="search" class="form-control rounded-pill" placeholder="Search contact"/>
</div>
<!-- accordion -->
<div class="bg-white w-25 rounded m-auto p-3 showSpinner">
   <div class="spinner-border text-primary" role="status">
  <span class="visually-hidden">Loading...</span>
</div>
</div>
<!-- contactlist -->
 <div id="light" class="bg-light pt-2" style = "display:none;">
   <div class="p-2">
  <span id="userCount">10</span>Contact
   </div>
      <div class="accordion mt-2" id="userAccordion">
      </div>
 </div>
</div>
</main>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="./script.js"></script>
</body>
</html>
