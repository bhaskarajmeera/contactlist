<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- bootstrap cdn  -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="./style.css">
<title>Contact List</title>
</head>
<body>
<div class="wrapper min-vh-100 d-flex justify-content-center align-items-center">
<div class="phone border border-5 border-black rounded-5 shadow-lg" style="height: 600px;width:300px">
    <!-- black section in phone icon -->
     <div class="text-white d-flex justify-content-between align-items-center overflow-y-scroll" style="height: 50px; padding:10px">
        <span>12:12</span>
        <div class="bg-black w-25 rounded-pill" style="height: 1.4rem;"></i>
        </div>
        <div><i class="bi bi-wifi"> </i>
        <i class="bi bi-bar-chart"></i>
        <i class="bi bi-battery-half"></i>
        </div>
     </div>

<!-- Home Screen -->
 <main class="homeScreen h-100 p-2 position-relative">
    <div class="slide-container bg-white p-3 rounded-4 shadow position-absolute" style="top:400px;">
        <input type="range" 
        min="0" 
        max="100" 
        value="0"
        class="slider"
        id="mySlider"/>
        <label id="lable" class="position-absolute text-center w-100">Slide To Unlock</label>
    </div>
 </main>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="./script.js"></script>
</body>
</html>
